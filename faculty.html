<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faculty Dashboard - Management</title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #eef2f3; margin: 20px; }
        .container { background: white; padding: 2rem; border-radius: 10px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 900px; margin: auto; }
        h2 { color: #333; border-bottom: 2px solid #2ecc71; padding-bottom: 10px; margin-top: 0; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #2ecc71; color: white; }
        input[type="number"], input[type="text"] { width: 90%; padding: 5px; border: 1px solid #ccc; border-radius: 3px; }
        .btn { padding: 10px 15px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; color: white; margin-top: 15px; }
        .btn-save { background-color: #2ecc71; }
        .btn-save:hover { background-color: #27ae60; }
        .btn-logout { background-color: #e74c3c; float: right; }
        .btn-add { background-color: #3498db; margin-right: 5px; }
        .actions { margin-top: 20px; display: flex; justify-content: space-between; }
        .form-inline { display: grid; grid-template-columns: repeat(5, 1fr) auto; gap: 10px; margin-top: 20px; background: #f9f9f9; padding: 15px; border-radius: 5px; }
    </style>
</head>
<body>

<div class="container">
    <button class="btn btn-logout" onclick="logout()">Logout</button>
    <h2>FACULTY GRADE MANAGEMENT</h2>
    
    <div id="msg" style="display:none; color: green; font-weight: bold; margin-bottom: 10px;"></div>

    <!-- Student Grades Table -->
    <table id="gradesTable">
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>BSMGt Grade</th>
                <th>GecSTS Grade</th>
                <th>ITInfra Grade</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            <!-- Dynamically populated -->
        </tbody>
    </table>

    <!-- Add New Student Form -->
    <h3>Add New Student</h3>
    <div class="form-inline">
        <input type="text" id="newID" placeholder="ID (e.g. 006)">
        <input type="text" id="newName" placeholder="Name">
        <input type="number" id="newBS" placeholder="BSMGt Grade" min="0" max="100">
        <input type="number" id="newGec" placeholder="GecSTS Grade" min="0" max="100">
        <input type="number" id="newIT" placeholder="ITInfra Grade" min="0" max="100">
        <button class="btn btn-add" style="margin: 0;" onclick="addStudent()">Add</button>
    </div>

    <!-- Save Changes Form -->
    <div class="actions">
        <button class="btn btn-save" onclick="saveGrades()">Upload & Save Changes</button>
    </div>
</div>

<script>
   
    if (sessionStorage.getItem('facultySessionActive') !== 'true') {
        window.location.href = "login.html"; // Change to your login file name if different
    }

    let localData = JSON.parse(localStorage.getItem("gradingSystemData"));

    function loadTable() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = "";

        for (let i = 0; i < localData.studentIDs.length; i++) {
            let row = `<tr>
                <td>${localData.studentIDs[i]}</td>
                <td>${localData.studentNames[i]}</td>
                <td><input type="number" step="0.1" class="bs-grade" value="${localData.BSMGtGrades[i]}" data-index="${i}"></td>
                <td><input type="number" step="0.1" class="gec-grade" value="${localData.GecSTSGrades[i]}" data-index="${i}"></td>
                <td><input type="number" step="0.1" class="it-grade" value="${localData.ITInfraGrades[i]}" data-index="${i}"></td>
            </tr>`;
            tbody.innerHTML += row;
        }
    }

    function addStudent() {
        const id = document.getElementById('newID').value.trim();
        const name = document.getElementById('newName').value.trim();
        const bs = parseFloat(document.getElementById('newBS').value) || 0;
        const gec = parseFloat(document.getElementById('newGec').value) || 0;
        const it = parseFloat(document.getElementById('newIT').value) || 0;

        if(!id || !name) {
            alert("ID and Name are required!");
            return;
        }

        localData.studentIDs.push(id);
        localData.studentNames.push(name);
        localData.BSMGtGrades.push(bs);
        localData.GecSTSGrades.push(gec);
        localData.ITInfraGrades.push(it);

        
        loadTable();
      
        document.getElementById('newID').value = "";
        document.getElementById('newName').value = "";
        document.getElementById('newBS').value = "";
        document.getElementById('newGec').value = "";
        document.getElementById('newIT').value = "";
    }

    function saveGrades() {

        const bsInputs = document.querySelectorAll('.bs-grade');
        const gecInputs = document.querySelectorAll('.gec-grade');
        const itInputs = document.querySelectorAll('.it-grade');

        bsInputs.forEach(input => {
            let idx = input.getAttribute('data-index');
            localData.BSMGtGrades[idx] = parseFloat(input.value) || 0;
        });

        gecInputs.forEach(input => {
            let idx = input.getAttribute('data-index');
            localData.GecSTSGrades[idx] = parseFloat(input.value) || 0;
        });

        itInputs.forEach(input => {
            let idx = input.getAttribute('data-index');
            localData.ITInfraGrades[idx] = parseFloat(input.value) || 0;
        });

        
        localStorage.setItem("gradingSystemData", JSON.stringify(localData));
        
      
        const msg = document.getElementById('msg');
        msg.innerText = "Grades updated and uploaded successfully!";
        msg.style.display = "block";
        setTimeout(() => { msg.style.display = "none"; }, 3000);
    }

    function logout() {
        sessionStorage.removeItem('facultySessionActive');
        window.location.href = "login.html"; // Change to your login file name if different
    }

    window.onload = loadTable;
</script>
</body>
</html>
