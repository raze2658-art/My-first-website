<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faculty Dashboard - Grade Manager</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #eef2f3;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }
        .card {
            background: white;
            padding: 2.5rem;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 800px;
        }
        h2 {
            color: #333;
            border-bottom: 2px solid #2ecc71;
            padding-bottom: 10px;
            margin-top: 0;
        }
        .msg {
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-size: 14px;
            font-weight: bold;
            text-align: center;
            display: none;
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: left;
        }
        th {
            background-color: #2ecc71;
            color: white;
            font-weight: bold;
        }
        tr:nth-child(even) {
            background-color: #f9f9f9;
        }
        input[type="number"] {
            width: 80px;
            padding: 6px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 14px;
        }
        .btn-container {
            margin-top: 25px;
            display: flex;
            justify-content: flex-end;
        }
        .btn {
            padding: 12px 25px;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .btn:hover {
            background-color: #27ae60;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>FACULTY GRADE EDITOR</h2>
        
        <div id="successBox" class="msg">Grades updated and posted successfully!</div>
        
        <table>
            <thead>
                <tr>
                    <th>Student ID</th>
                    <th>Student Name</th>
                    <th>BSMGt Grade</th>
                    <th>GecSTS Grade</th>
                    <th>ITInfra Grade</th>
                </tr>
            </thead>
            <tbody id="gradesTableBody">
                <!-- Data dynamically inserted here -->
            </tbody>
        </table>

        <div class="btn-container">
            <button class="btn" onclick="postAndSaveGrades()">Post & Save Grades</button>
        </div>
    </div>

<script>
    // Fetch system data from localStorage
    let systemData = JSON.parse(localStorage.getItem("gradingSystemData"));

    // Fallback template if login portal has not initialized the database yet
    if (!systemData) {
        systemData = {
            studentNames: ["Allyssa", "Noela", "Chloe", "Merk", "Yohei"],
            studentIDs: ["001", "002", "003", "004", "005"],
            BSMGtGrades: [85.5, 60.0, 92.0, 99.0, 99.0],
            GecSTSGrades: [90.0, 70.5, 88.0, 99.0, 95.0],
            ITInfraGrades: [78.5, 65.0, 95.0, 99.0, 95.0]
        };
    }

    // Render table rows dynamically based on the stored data
    function renderTable() {
        const tbody = document.getElementById('gradesTableBody');
        tbody.innerHTML = "";

        for (let i = 0; i < systemData.studentIDs.length; i++) {
            let row = `<tr>
                <td><strong>${systemData.studentIDs[i]}</strong></td>
                <td>${systemData.studentNames[i]}</td>
                <td><input type="number" step="0.1" min="0" max="100" class="bs-input" data-index="${i}" value="${systemData.BSMGtGrades[i]}"></td>
                <td><input type="number" step="0.1" min="0" max="100" class="gec-input" data-index="${i}" value="${systemData.GecSTSGrades[i]}"></td>
                <td><input type="number" step="0.1" min="0" max="100" class="it-input" data-index="${i}" value="${systemData.ITInfraGrades[i]}"></td>
            </tr>`;
            tbody.innerHTML += row;
        }
    }

    // Capture input elements, update JSON data structure, and push to localStorage
    function postAndSaveGrades() {
        const bsInputs = document.querySelectorAll('.bs-input');
        const gecInputs = document.querySelectorAll('.gec-input');
        const itInputs = document.querySelectorAll('.it-input');

        bsInputs.forEach(input => {
            let idx = input.getAttribute('data-index');
            systemData.BSMGtGrades[idx] = parseFloat(input.value) || 0;
        });

        gecInputs.forEach(input => {
            let idx = input.getAttribute('data-index');
            systemData.GecSTSGrades[idx] = parseFloat(input.value) || 0;
        });

        itInputs.forEach(input => {
            let idx = input.getAttribute('data-index');
            systemData.ITInfraGrades[idx] = parseFloat(input.value) || 0;
        });

        // Save updated data structure to the common browser storage block
        localStorage.setItem("gradingSystemData", JSON.stringify(systemData));
        
        // Show confirmation pop-up window notification
        const box = document.getElementById('successBox');
        box.style.display = "block";
        window.scrollTo({ top: 0, behavior: 'smooth' });
        
        setTimeout(() => {
            box.style.display = "none";
        }, 3000);
    }

    // Build the grid presentation view right away when page loads
    window.onload = renderTable;
</script>
</body>
</html>
