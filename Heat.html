<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>weather weather lang.ph - Blue Live Edition</title>
    <style>
        :root {
            --bg-color: #e3f2fd;
            --app-bg: #ffffff;
            --primary-color: #1e88e5;
            --secondary-color: #90caf9;
            --text-color: #0d47a1;
            --card-bg: #bbdefb;
            --border-color: #e3f2fd;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .phone-container {
            width: 380px;
            height: 870px;
            background: var(--app-bg);
            border-radius: 44px;
            box-shadow: 0 20px 50px rgba(13, 71, 161, 0.15);
            border: 10px solid #90caf9;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .app-header {
            padding: 15px 20px 5px 20px;
            text-align: center;
            background: #fff;
        }

        .app-title {
            font-size: 1.4rem;
            font-weight: 900;
            color: #1565c0;
            margin: 0;
            letter-spacing: -0.5px;
        }

        .datetime-sub {
            font-size: 0.75rem;
            color: #1e88e5;
            margin: 5px 0 2px 0;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            background: #e3f2fd;
            padding: 4px 10px;
            border-radius: 20px;
            display: inline-block;
        }

        .name-panel {
            padding: 5px 15px;
            display: flex;
            gap: 8px;
            background: #fff;
        }

        .name-input {
            flex: 1;
            padding: 8px 12px;
            border: 2px solid #90caf9;
            border-radius: 12px;
            font-size: 0.8rem;
            outline: none;
            color: var(--text-color);
        }

        .name-btn {
            background: #1976d2;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: bold;
        }

        .search-container {
            padding: 10px 15px;
            position: relative;
            z-index: 20;
            background: #fff;
        }

        .search-input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 20px;
            border: 2px solid #bbdefb;
            box-sizing: border-box;
            outline: none;
            font-size: 0.9rem;
            background-color: #f5f5f5;
            color: var(--text-color);
        }

        .dropdown-list {
            position: absolute;
            top: 100%;
            left: 15px;
            right: 15px;
            background: white;
            border: 2px solid #bbdefb;
            border-top: none;
            border-radius: 0 0 20px 20px;
            max-height: 200px;
            overflow-y: auto;
            box-shadow: 0 12px 24px rgba(0,0,0,0.05);
            display: none;
        }

        .dropdown-item {
            padding: 12px 16px;
            cursor: pointer;
            font-size: 0.85rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #0d47a1;
        }

        .dropdown-item:hover {
            background-color: #e3f2fd;
        }

        .badge-major {
            background-color: #e3f2fd;
            color: #1565c0;
            font-size: 0.65rem;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 8px;
        }

        .weather-card {
            margin: 5px 15px 10px 15px;
            padding: 18px;
            border-radius: 24px;
            text-align: center;
            color: white;
            box-shadow: 0 8px 20px rgba(21, 101, 192, 0.2);
            background: linear-gradient(135deg, #1e88e5, #0d47a1);
            transition: all 0.5s ease;
        }

        .active-location {
            font-weight: 800;
            font-size: 1.1rem;
        }

        .temperature {
            font-size: 3rem;
            font-weight: 900;
            margin: 2px 0;
        }

        .condition-label {
            font-size: 0.8rem;
            font-weight: 700;
            padding: 4px 12px;
            border-radius: 12px;
            display: inline-block;
            background: rgba(255, 255, 255, 0.2);
            text-transform: uppercase;
        }

        /* Pet Area */
        .pet-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 15px;
            background-color: #f7fbff;
            margin: 0 15px 10px 15px;
            border-radius: 32px;
            border: 3px dashed #90caf9;
            position: relative;
        }

        .pet-name-tag {
            font-size: 0.85rem;
            font-weight: bold;
            background: #1565c0;
            color: white;
            padding: 3px 12px;
            border-radius: 12px;
            margin-bottom: 5px;
        }

        .pet-stage {
            position: relative;
            width: 140px;
            height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .pet-avatar {
            font-size: 5rem;
            z-index: 2;
            display: inline-block;
            user-select: none;
        }

        .lively-bounce { animation: livelyDance 0.6s infinite alternate cubic-bezier(0.455, 0.03, 0.515, 0.955); }
        .lively-shiver { animation: livelyShiver 0.15s infinite alternate; }
        .lively-pant { animation: livelyPant 0.4s infinite alternate; }

        @keyframes livelyDance {
            0% { transform: translateY(0) scale(1); rotate: -3deg; }
            100% { transform: translateY(-12px) scale(1.05) rotate(3deg); }
        }
        @keyframes livelyShiver {
            0% { transform: translateX(-2px) translateY(1px); }
            100% { transform: translateX(2px) translateY(-1px); }
        }
        @keyframes livelyPant {
            0% { transform: scale(1) scaleY(1); }
            100% { transform: scale(1.05) scaleY(0.92); }
        }

        .applied-item-overlay {
            position: absolute;
            top: -15px;
            right: -15px;
            z-index: 5;
            display: none;
        }

        .realistic-champorado-bowl {
            width: 70px;
            height: 50px;
            background: #5d4037; 
            border-radius: 10px 10px 35px 35px;
            border: 3px solid #90caf9;
            position: relative;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
            animation: floatingEffect 2.5s infinite ease-in-out;
        }

        .realistic-champorado-bowl::before {
            content: '';
            position: absolute;
            top: 2px;
            left: 3px;
            right: 3px;
            height: 18px;
            background: radial-gradient(circle, #3e2723 60%, #1a0c02 100%);
            border-radius: 50%;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.6);
        }

        .milk-swirl {
            position: absolute;
            top: 5px;
            left: 15px;
            width: 35px;
            height: 10px;
            border-radius: 50%;
            border: 2px solid rgba(225, 245, 254, 0.9);
            border-top: none;
            border-right: none;
            transform: rotate(-15deg);
            animation: swirlMotion 3s infinite linear;
        }

        .steam-wrapper {
            position: absolute;
            top: -25px;
            left: 20px;
            display: flex;
            gap: 6px;
        }

            width: 4px;
            height: 20px;
            background: rgba(255,255,2
