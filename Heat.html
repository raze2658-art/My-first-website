<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>weather weather lang.ph - Blue Live Edition</title>
    <style>
        :root {
            --bg-color: #e3f2fd;
            --app-bg: #ffffff;
            --primary-color: #1e88e5;
            --secondary-color: #90caf9;
            --text-color: #0d47a1;
            --card-bg: #bbdefb;
            --border-color: #e3f2fd;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .phone-container {
            width: 380px;
            height: 870px;
            background: var(--app-bg);
            border-radius: 44px;
            box-shadow: 0 20px 50px rgba(13, 71, 161, 0.15);
            border: 10px solid #90caf9;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .app-header {
            padding: 15px 20px 5px 20px;
            text-align: center;
            background: #fff;
        }

        .app-title {
            font-size: 1.4rem;
            font-weight: 900;
            color: #1565c0;
            margin: 0;
            letter-spacing: -0.5px;
        }

        .datetime-sub {
            font-size: 0.75rem;
            color: #1e88e5;
            margin: 5px 0 2px 0;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            background: #e3f2fd;
            padding: 4px 10px;
            border-radius: 20px;
            display: inline-block;
        }

        .name-panel {
            padding: 5px 15px;
            display: flex;
            gap: 8px;
            background: #fff;
        }

        .name-input {
            flex: 1;
            padding: 8px 12px;
            border: 2px solid #90caf9;
            border-radius: 12px;
            font-size: 0.8rem;
            outline: none;
            color: var(--text-color);
        }

        .name-btn {
            background: #1976d2;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: bold;
        }

        .search-container {
            padding: 10px 15px;
            position: relative;
            z-index: 20;
            background: #fff;
        }

        .search-input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 20px;
            border: 2px solid #bbdefb;
            box-sizing: border-box;
            outline: none;
            font-size: 0.9rem;
            background-color: #f5f5f5;
            color: var(--text-color);
        }

        .dropdown-list {
            position: absolute;
            top: 100%;
            left: 15px;
            right: 15px;
            background: white;
            border: 2px solid #bbdefb;
            border-top: none;
            border-radius: 0 0 20px 20px;
            max-height: 200px;
            overflow-y: auto;
            box-shadow: 0 12px 24px rgba(0,0,0,0.05);
            display: none;
        }

        .dropdown-item {
            padding: 12px 16px;
            cursor: pointer;
            font-size: 0.85rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #0d47a1;
        }

        .dropdown-item:hover {
            background-color: #e3f2fd;
        }

        .badge-major {
            background-color: #e3f2fd;
            color: #1565c0;
            font-size: 0.65rem;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 8px;
        }

        /* Weather Panel - Shades of Blue Design */
        .weather-card {
            margin: 5px 15px 10px 15px;
            padding: 18px;
            border-radius: 24px;
            text-align: center;
            color: white;
            box-shadow: 0 8px 20px rgba(21, 101, 192, 0.2);
            background: linear-gradient(135deg, #1e88e5, #0d47a1);
            transition: all 0.5s ease;
        }

        .active-location {
            font-weight: 800;
            font-size: 1.1rem;
        }

        .temperature {
            font-size: 3rem;
            font-weight: 900;
            margin: 2px 0;
        }

        .condition-label {
            font-size: 0.8rem;
            font-weight: 700;
            padding: 4px 12px;
            border-radius: 12px;
            display: inline-block;
            background: rgba(255, 255, 255, 0.2);
            text-transform: uppercase;
        }

        /* Pet Area */
        .pet-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 15px;
            background-color: #f7fbff;
            margin: 0 15px 10px 15px;
            border-radius: 32px;
            border: 3px dashed #90caf9;
            position: relative;
        }

        .pet-name-tag {
            font-size: 0.85rem;
            font-weight: bold;
            background: #1565c0;
            color: white;
            padding: 3px 12px;
            border-radius: 12px;
            margin-bottom: 5px;
        }

        .pet-stage {
            position: relative;
            width: 140px;
            height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .pet-avatar {
            font-size: 5rem;
            z-index: 2;
            display: inline-block;
        }

        .lively-bounce { animation: livelyDance 0.6s infinite alternate cubic-bezier(0.455, 0.03, 0.515, 0.955); }
        .lively-shiver { animation: livelyShiver 0.15s infinite alternate; }
        .lively-pant { animation: livelyPant 0.4s infinite alternate; }

        @keyframes livelyDance {
            0% { transform: translateY(0) scale(1); rotate: -3deg; }
            100% { transform: translateY(-12px) scale(1.05) rotate(3deg); }
        }
        @keyframes livelyShiver {
            0% { transform: translateX(-2px) translateY(1px); }
            100% { transform: translateX(2px) translateY(-1px); }
        }
        @keyframes livelyPant {
            0% { transform: scale(1) scaleY(1); }
            100% { transform: scale(1.05) scaleY(0.92); }
        }

        /* Realistic Animated CSS Champorado Asset */
        .applied-item-overlay {
            position: absolute;
            top: -15px;
            right: -15px;
            z-index: 5;
            display: none;
        }

        .realistic-champorado-bowl {
            width: 70px;
            height: 50px;
            background: #5d4037; 
            border-radius: 10px 10px 35px 35px;
            border: 3px solid #90caf9; /* Blue accent rim */
            position: relative;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
            animation: floatingEffect 2.5s infinite ease-in-out;
        }

        .realistic-champorado-bowl::before {
            content: '';
            position: absolute;
            top: 2px;
            left: 3px;
            right: 3px;
            height: 18px;
            background: radial-gradient(circle, #3e2723 60%, #1a0c02 100%);
            border-radius: 50%;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.6);
        }

        .milk-swirl {
            position: absolute;
            top: 5px;
            left: 15px;
            width: 35px;
            height: 10px;
            border-radius: 50%;
            border: 2px solid rgba(225, 245, 254, 0.9);
            border-top: none;
            border-right: none;
            transform: rotate(-15deg);
            animation: swirlMotion 3s infinite linear;
        }

        .steam-wrapper {
            position: absolute;
            top: -25px;
            left: 20px;
            display: flex;
            gap: 6px;
        }

        .steam-vent {
            width: 4px;
            height: 20px;
            background: rgba(255,255,255,0.5);
            border-radius: 4px;
            filter: blur(2px);
            animation: steamRise 1.6s infinite linear;
        }

        .steam-vent:nth-child(2) { animation-delay: 0.4s; height: 24px; }
        .steam-vent:nth-child(3) { animation-delay: 0.8s; }

        @keyframes steamRise {
            0% { transform: translateY(10px) scaleX(1); opacity: 0; }
            50% { transform: translateY(0px) scaleX(1.5); opacity: 0.6; }
            100% { transform: translateY(-15px) scaleX(2); opacity: 0; }
        }

        @keyframes swirlMotion {
            0%, 100% { transform: rotate(-15deg) scale(1); }
            50% { transform: rotate(-10deg) scale(1.08); }
        }

        @keyframes floatingEffect {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .simple-emoji-asset {
            font-size: 3rem;
            animation: floatingEffect 2s infinite ease-in-out;
        }

        .pet-bubble {
            background: white;
            padding: 12px 16px;
            border-radius: 20px;
            box-shadow: 0 6px 15px rgba(13, 71, 161, 0.05);
            font-size: 0.85rem;
            font-weight: 600;
            text-align: center;
            max-width: 85%;
            border: 2px solid #bbdefb;
            margin-top: 10px;
        }

        /* Care Shelf */
        .care-shelf {
            margin: 0 15px 10px 15px;
            background: #e3f2fd;
            border: 2px solid #90caf9;
            border-radius: 24px;
            padding: 10px 12px;
            text-align: center;
        }

        .shelf-title {
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            color: #1565c0;
            margin-bottom: 8px;
        }

        .item-grid {
            display: flex;
            justify-content: space-around;
            gap: 8px;
        }

        .care-item {
            background: white;
            border: 2px solid #90caf9;
            border-radius: 16px;
            padding: 8px;
            cursor: pointer;
            font-size: 1.6rem;
            width: 55px;
            height: 55px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .care-item:hover {
            transform: scale(1.15) rotate(10deg);
            background-color: #bbdefb;
        }
    </style>
</head>
<body>

    <div class="phone-container">
        <div class="app-header">
            <h1 class="app-title">weather weather lang.ph</h1>
            <div id="dateDisplay" class="datetime-sub">Loading PHT Clock...</div>
        </div>

        <div class="name-panel">
            <input type="text" id="petNameInput" class="name-input" placeholder="Give your pet a name..." value="Bantay">
            <button class="name-btn" onclick="savePetName()">Save</button>
        </div>

        <div class="search-container">
            <input type="text" id="citySearch" class="search-input" placeholder="🔍 Search any city (e.g. Silay, Talisay)..." autocomplete="off">
            <div id="dropdownList" class="dropdown-list"></div>
        </div>

        <div id="weatherCard" class="weather-card">
            <div id="activeCityDisplay" class="active-location">Silay City</div>
            <div id="tempDisplay" class="temperature">--°C</div>
            <div id="conditionDisplay" class="condition-label">Fetching Live Data...</div>
        </div>

        <div class="pet-container">
            <div id="petNameTag" class="pet-name-tag">Bantay</div>
            <div class="pet-stage">
                <div id="petAvatar" class="pet-avatar lively-bounce">🐶</div>
                <div id="itemOverlay" class="applied-item-overlay"></div>
            </div>
            <div id="petBubble" class="pet-bubble">Connecting to live weather grid...</div>
        </div>

        <div class="care-shelf">
            <div class="shelf-title">🎒 Help your pet cope with the weather</div>
            <div class="item-grid">
                <button class="care-item" title="Malamig na Tubig" onclick="applyCareItem('water')">🥣</button>
                <button class="care-item" title="Makapal na Jacket" onclick="applyCareItem('jacket')">🧥</button>
                <button class="care-item" title="Dahon na Payong" onclick="applyCareItem('umbrella')">🍃</button>
                <button class="care-item" title="Mainit na Champorado" onclick="applyCareItem('food')">🍲</button>

    </div>

            { name: "Tagig / Taguig", lat: 14.5176, lon: 121.0509 },
            { name: "Tagum", lat: 7.4472, lon: 125.8078 },
            { name: "Tarlac City", lat: 15.4853, lon: 120.5908 },
            { name: "Toledo", lat: 10.3800, lon: 123.6400 },
            { name: "Trece Martires", lat: 14.2814, lon: 120.8658 },

            { name: "Urdaneta", lat: 15.9761, lon: 120.5711 },
            { name: "Valenzuela", lat: 14.6922, lon: 120.9703 },
            { name: "Vigan City", lat: 17.5747, lon: 120.3869 },
            { name: "Zamboanga City", lat: 6.9214, lon: 122.0797 }
        ];

        let currentCity = philippineCities[0]; 
        let currentTemp = 28;
        let weatherProfile = "normal"; 
        let isItemApplied = false;
        let petName = "Bantay";

        const searchInput = document.getElementById('citySearch');
        const dropdownList = document.getElementById('dropdownList');

        function savePetName() {
            const inputVal = document.getElementById('petNameInput').value.trim();
            if(inputVal) {
                petName = inputVal;
                document.getElementById('petNameTag').innerText = petName;
                evaluatePetDialogue();
            }
        }

        function updatePHClock() {
            const options = { timeZone: "Asia/Manila", weekday: 'short', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit' };
            document.getElementById('dateDisplay').innerText = PHT •  + new Date().toLocaleString("en-US", options);
        }
        setInterval(updatePHClock, 1000);

        // Core Live JSON Fetch API Stream Routine
        async function fetchLiveWeather(city) {
            document.getElementById('conditionDisplay').innerText = "FETCHING DATA...";
            try {
                const response = await fetch(https://api.open-meteo.com/v1/forecast?latitude=${city.lat}&longitude=${city.lon}&current_weather=true);
                const data = await response.json();
                
                if(data && data.current_weather) {
                    currentTemp = Math.round(data.current_weather.temperature);
                    const code = data.current_weather.weathercode;
                    
                    document.getElementById('tempDisplay').innerText = ${currentTemp}°C;
                    isItemApplied = false; 
                    
                    // Categorize based on meteorological parameters
                    if (code >= 61) {
                        weatherProfile = "rain";
                        document.getElementById('conditionDisplay').innerText = "🌧️ Heavy Rain / Habagat";
                        document.getElementById('weatherCard').style.background = "linear-gradient(135deg, #4682b4, #1d4e89)";
                    } else if (currentTemp >= 33) {
                        weatherProfile = "hot";
                        document.getElementById('conditionDisplay').innerText = "☀️ Intense Heatwave";
                        document.getElementById('weatherCard').style.background = "linear-gradient(135deg, #1e88e5, #0056b3)";
                    } else if (currentTemp <= 24) {
                        weatherProfile = "cold";
                        document.getElementById('conditionDisplay').innerText = "🍃 Cool Amihan Breeze";
                        document.getElementById('weatherCard').style.background = "linear-gradient(135deg, #a0c4ff, #4682b4)";
                    } else {
                        weatherProfile = "normal";
                        document.getElementById('conditionDisplay').innerText = "🌤️ Fair Weather";
                        document.getElementById('weatherCard').style.background = "linear-gradient(135deg, #3a86c8, #0d47a1)";
                    }
                    
                    evaluatePetDialogue();
                }
            } catch (error) {
                document.getElementById('conditionDisplay').innerText = "API Offline - Fallback";
            }
        }

        function evaluatePetDialogue() {
            const avatar = document.getElementById('petAvatar');
            const bubble = document.getElementById('petBubble');
            const overlay = document.getElementById('itemOverlay');

            if (isItemApplied) return; 

            overlay.style.display = "none";

            if (weatherProfile === "hot") {
                avatar.innerText = "🐶";
                avatar.className = "pet-avatar lively-pant";
                bubble.innerText = ${petName}: Inggit ako sa mga nasa beach! Ang init-init dito sa labas, feeling ko literal akong matutunaw. Can I have some cold water please? 🥣;
            } else if (weatherProfile === "rain") {
                avatar.innerText = "🐱";
                avatar.className = "pet-avatar lively-shiver";
                bubble.innerText = ${petName}: Oh no, look outside! Ang lakas ng rain shower, baka bumaha. Mas masarap humigop ng mainit na champorado ngayon... 🍲;
            } else if (weatherProfile === "cold") {
                avatar.innerText = "🐱";
                avatar.className = "pet-avatar lively-shiver";
                bubble.innerText = ${petName}: Hala, parang nasa Baguio bigla! Ang lamig ng simoy ng Amihan. Can you share your thick jacket with me? 🧥;
            } else {
                avatar.innerText = "🐶";
                avatar.className = "pet-avatar lively-bounce";
                bubble.innerText = ${petName}: Sobrang chill lang ng weather today! Tamang-tama ang simoy ng hangin para maglaro sa labas. Let's go out!;
            }
        }

        function applyCareItem(itemType) {
            const overlay = document.getElementById('itemOverlay');
            overlay.className = "applied-item-overlay";
            overlay.innerHTML = "";

            if (itemType === 'food') {
                overlay.innerHTML = `
                    <div class="realistic-champorado-bowl">
                        <div class="steam-wrapper"><div class="steam-vent"></div><div class="steam-vent"></div></div>
                        <div class="milk-swirl"></div>
                    </div>`;
            } else {
                const itemEmojiMap = { water: "🥣", jacket: "🧥", umbrella: "🍃" };
                overlay.innerHTML = <span class="simple-emoji-asset">${itemEmojiMap[itemType]}</span>;
            }
            overlay.style.display = "block";

            // Logic handling matching items with the current weather situation
            if (itemType === 'water' && weatherProfile === 'hot') {
                isItemApplied = true;
                document.getElementById('petBubble').innerText = ${petName}: Ang refreshing! Thank you for the cold water, now ready na uli ako humataw!;
                document.getElementById('petAvatar').className = "pet-avatar lively-bounce";
            } else if (itemType === 'food' && weatherProfile === 'rain') {
                isItemApplied = true;
                document.getElementById('petBubble').innerText = ${petName}: Solid! This realistic champorado swirl is so good. Nawala bigla yung gloomy vibes ng bagyo!;
                document.getElementById('petAvatar').className = "pet-avatar lively-bounce";
            } else if (itemType === 'jacket' && weatherProfile === 'cold') {
                isItemApplied = true;
                document.getElementById('petBubble').innerText = ${petName}: Wow, ang lambot naman nito! Very aesthetic blue jacket, super fit sa katawan ko.;
                document.getElementById('petAvatar').className = "pet-avatar lively-bounce";
            } else {
                document.getElementById('petBubble').innerText = ${petName}: Thank you, pero hindi ko kailangan nyan sa ngayon! Tingnan mo uli yung current status ko.;
            }
        }

        // Live Dynamic Dropdown Auto-filtration UI Search Routine
        searchInput.addEventListener('input', () => {
            const query = searchInput.value.toLowerCase().trim();
            dropdownList.innerHTML = '';
            if (!query) { dropdownList.style.display = 'none'; return; }

            const filtered = philippineCities.filter(c => c.name.toLowerCase().includes(query));
            if (filtered.length === 0) {
                const noResult = document.createElement('div');
                noResult.className = 'dropdown-item';
                noResult.innerText = "No matching PH city found";
                dropdownList.appendChild(noResult);
            } else {
                filtered.forEach(city => {
                    const item = document.createElement('div');
                    item.className = 'dropdown-item';
                    item.innerHTML = <span>${city.name}</span> <span class="badge-major">PH</span>;
                    item.addEventListener('click', () => {
                        currentCity = city;
                        document.getElementById('activeCityDisplay').innerText = city.name;
                        searchInput.value = '';
                        dropdownList.style.display = 'none';
                        fetchLiveWeather(city);
                    });
                    dropdownList.appendChild(item);
                });
            }
            dropdownList.style.display = 'block';
        });

        document.addEventListener('click', (e) => {
            if (!searchInput.contains(e.target) && !dropdownList.contains(e.target)) dropdownList.style.display = 'none';
        });

        // Initialize Routine on load
        updatePHClock();
        fetchLiveWeather(currentCity);
    </script>
</body>
</html>
