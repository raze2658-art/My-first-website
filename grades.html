<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Grading System - Report Card</title>
  <style>
    body { font-family: 'Arial', sans-serif; background-color: #eef2f3; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
    .card { background: white; padding: 2rem; border-radius: 10px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
    h2 { text-align: center; color: #333; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
    #gradeSlip { margin-top: 20px; padding: 15px; border: 1px dashed #3498db; background: #f9f9f9; }
    .result-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-family: monospace; }
    .pass { color: green; font-weight: bold; }
    .fail { color: red; font-weight: bold; }
    .logout-btn { display: block; text-align: center; box-sizing: border-box; width: 100%; padding: 12px; background-color: #e74c3c; color: white; text-decoration: none; border-radius: 5px; font-size: 16px; font-weight: bold; margin-top: 15px; }
    .logout-btn:hover { background-color: #c0392b; }
  </style>
</head>
<body>

<div class="card">
  <h2>STUDENT PORTAL</h2>
  <div id="gradeSlip">
    <h3 style="text-align:center; margin-top:0;">===== GRADE SLIP =====</h3>
    <div class="result-row"><span>Name:</span> <span id="resName"></span></div>
    <div class="result-row"><span>ID:</span> <span id="resID"></span></div>
    <hr>
    <div class="result-row"><span>BSMGT:</span> <span id="resBSMGT"></span></div>
    <div class="result-row"><span>GECSTS:</span> <span id="resGEC"></span></div>
    <div class="result-row"><span>ITInfra:</span> <span id="resIT"></span></div>
    <hr>
    <div class="result-row"><strong>Average:</strong> <strong id="resAvg"></strong></div>
    <div class="result-row"><strong>Status:</strong> <span id="resStatus"></span></div>
    
    <!-- Standard HTML href link to go back to login screen -->
    <a href="index.html" class="logout-btn">Logout</a>
  </div>
</div>

<script>
// Student Data arrays
const studentNames = ["Allyssa", "Noela", "Chloe", "Merk", "Yohei"];
const studentIDs = ["001", "002", "003", "004", "005"];
const BSMGtGrades = [85.5, 60.0, 92.0, 99.0, 99.0];
const GecSTSGrades = [90.0, 70.5, 88.0, 99.0, 95.0];
const ITInfraGrades = [78.5, 65.0, 95.0, 99.0, 95.0];
const passingGrade = 75.0;

// Read the index saved during login page execution
const i = sessionStorage.getItem('loggedInIndex');

if (i !== null) {
  document.getElementById('resName').innerText = studentNames[i];
  document.getElementById('resID').innerText = studentIDs[i];
  document.getElementById('resBSMGT').innerText = BSMGtGrades[i].toFixed(1);
  document.getElementById('resGEC').innerText = GecSTSGrades[i].toFixed(1);
  document.getElementById('resIT').innerText = ITInfraGrades[i].toFixed(1);
  
  let avg = (BSMGtGrades[i] + GecSTSGrades[i] + ITInfraGrades[i]) / 3;
  document.getElementById('resAvg').innerText = avg.toFixed(1);
  
  let statusEl = document.getElementById('resStatus');
  if (avg >= passingGrade) {
    statusEl.innerText = "PASSED";
    statusEl.className = "pass";
  } else {
    statusEl.innerText = "FAILED";
    statusEl.className = "fail";
  }
} else {
  // Kick back unauthorized direct URL visits to login screen
  window.location.href = "index.html";
}
</script>
</body>
</html>
