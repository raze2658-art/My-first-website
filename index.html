<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Grading System - Login</title>
  <style>
    body { font-family: 'Arial', sans-serif; background-color: #eef2f3; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
    .card { background: white; padding: 2rem; border-radius: 10px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
    h2 { text-align: center; color: #333; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
    .input-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; }
    input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
    button { width: 100%; padding: 12px; background-color: #3498db; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 10px; }
    button:hover { background-color: #2980b9; }
    .error { color: red; text-align: center; margin-top: 10px; font-size: 14px; }
  </style>
</head>
<body>

<div class="card">
  <h2>STUDENT LOGIN</h2>
  <div class="input-group">
    <label>Username</label>
    <input type="text" id="userInput" placeholder="Enter username">
  </div>
  <div class="input-group">
    <label>Password</label>
    <input type="password" id="passInput" placeholder="Enter password">
  </div>
  <button onclick="processLogin()">Login & View Grades</button>
  <p id="errorMessage" class="error"></p>
</div>

<script>
const studentNames = ["Allyssa", "Noela", "Chloe", "Merk", "Yohei"];
const studentIDs = ["001", "002", "003", "004", "005"];
const usernames = ["ally", "noe", "chlo", "merk", "yohei"];
const passwords = ["Melendres123", "Talavera123", "Tolentino123", "Magdali123", "Komori123"];
const BSMGtGrades = [85.5, 60.0, 92.0, 99.0, 99.0];
const GecSTSGrades = [90.0, 70.5, 88.0, 99.0, 95.0];
const ITInfraGrades = [78.5, 65.0, 95.0, 99.0, 95.0];

function processLogin() {
  const inputU = document.getElementById('userInput').value;
  const inputP = document.getElementById('passInput').value;
  const errorMsg = document.getElementById('errorMessage');
  let loginSuccess = false;
  
  errorMsg.innerText = "";
  
  for (let i = 0; i < usernames.length; i++) {
    if (usernames[i] === inputU && passwords[i] === inputP) {
      loginSuccess = true;
      
      sessionStorage.setItem('loggedInIndex', i);
      
      window.location.href = "grade.html";
      break;
    }
  }
  
  if (!loginSuccess) {
    errorMsg.innerText = "Invalid username or password!";
  }
}
</script>
</body>
</html>
