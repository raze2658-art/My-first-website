<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Grading System</title>
<style>
body {
  font-family: 'Arial', sans-serif;
  background-color: #eef2f3;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  margin: 0;
}
.card {
  background: white;
  padding: 2rem;
  border-radius: 10px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
  width: 100%;
  max-width: 400px;
}
h2 {
  text-align: center;
  color: #333;
  border-bottom: 2px solid #3498db;
  padding-bottom: 10px;
}
.input-group {
  margin-bottom: 15px;
}
label {
  display: block;
  margin-bottom: 5px;
  font-weight: bold;
  color: #555;
}
input {
  width: 100%;
  padding: 10px;
  border: 1px solid #ddd;
  border-radius: 5px;
  box-sizing: border-box;
}
button {
  width: 100%;
  padding: 12px;
  background-color: #3498db;
  color: white;
  border: none;
  border-radius: 5px;
  cursor: pointer;
  font-size: 16px;
  font-weight: bold;
  margin-top: 10px;
}
button:hover {
  background-color: #2980b9;
}
#gradeSlip {
  margin-top: 20px;
  padding: 15px;
  border: 1px dashed #3498db;
  background: #f9f9f9;
  display: none;
}
.result-row {
  display: flex;
  justify-content: space-between;
  margin-bottom: 8px;
  font-family: monospace;
}
.pass {
  color: green;
  font-weight: bold;
}
.fail {
  color: red;
  font-weight: bold;
}
.error {
  color: red;
  text-align: center;
  margin-top: 10px;
  font-size: 14px;
}

/* Styled Anchor Link to match existing UI buttons */
.button-link {
  display: block;
  text-align: center;
  box-sizing: border-box;
  width: 100%;
  padding: 12px;
  background-color: #2ecc71;
  color: white;
  text-decoration: none;
  border-radius: 5px;
  font-size: 16px;
  font-weight: bold;
  margin-top: 15px;
}
.button-link:hover {
  background-color: #27ae60;
}
</style>
</head>
<body>
<div class="card">
  <h2>STUDENT LOGIN</h2>
  <div class="input-group">
    <label>Username</label>
    <input type="text" id="userInput" placeholder="Enter username">
  </div>
  <div class="input-group">
    <label>Password</label>
    <input type="password" id="passInput" placeholder="Enter password">
  </div>
  <button onclick="processLogin()">Login & View Grades</button>
  <p id="errorMessage" class="error"></p>
  
  <div id="gradeSlip">
    <h3 style="text-align:center; margin-top:0;">===== GRADE SLIP =====</h3>
    <div class="result-row"><span>Name:</span> <span id="resName"></span></div>
    <div class="result-row"><span>ID:</span> <span id="resID"></span></div>
    <hr>
    <div class="result-row"><span>BSMGT:</span> <span id="resBSMGT"></span></div>
    <div class="result-row"><span>GECSTS:</span> <span id="resGEC"></span></div>
    <div class="result-row"><span>ITInfra:</span> <span id="resIT"></span></div>
    <hr>
    <div class="result-row"><strong>Average:</strong> <strong id="resAvg"></strong></div>
    <div class="result-row"><strong>Status:</strong> <span id="resStatus"></span></div>
    
    <!-- Added href link styled as a button (Change "nextpage.html" to your file target) -->
    <a href="nextpage.html" class="button-link">Go to Dashboard</a>
  </div>
</div>

<script>
const studentNames = ["Allyssa", "Noela", "Chloe", "Merk", "Yohei"];
const studentIDs = ["001", "002", "003", "004", "005"];
const usernames = ["ally", "noe", "chlo", "merk", "yohei"];
const passwords = ["Melendres123", "Talavera123", "Tolentino123", "Magdali123", "Komori123"];
const BSMGtGrades = [85.5, 60.0, 92.0, 99.0, 99.0];
const GecSTSGrades = [90.0, 70.5, 88.0, 99.0, 95.0];
const ITInfraGrades = [78.5, 65.0, 95.0, 99.0, 95.0];
const passingGrade = 75.0;

function processLogin() {
  const inputU = document.getElementById('userInput').value;
  const inputP = document.getElementById('passInput').value;
  const errorMsg = document.getElementById('errorMessage');
  const slip = document.getElementById('gradeSlip');
  let loginSuccess = false;
  
  errorMsg.innerText = "";
  slip.style.display = "none";
  
  for (let i = 0; i < usernames.length; i++) {
    if (usernames[i] === inputU && passwords[i] === inputP) {
      loginSuccess = true;
      document.getElementById('resName').innerText = studentNames[i];
      document.getElementById('resID').innerText = studentIDs[i];
      document.getElementById('resBSMGT').innerText = BSMGtGrades[i].toFixed(1);
      document.getElementById('resGEC').innerText = GecSTSGrades[i].toFixed(1);
      document.getElementById('resIT').innerText = ITInfraGrades[i].toFixed(1);
      
      let avg = (BSMGtGrades[i] + GecSTSGrades[i] + ITInfraGrades[i]) / 3;
      document.getElementById('resAvg').innerText = avg.toFixed(1);
      
      let statusEl = document.getElementById('resStatus');
      if (avg >= passingGrade) {
        statusEl.innerText = "PASSED";
        statusEl.className = "pass";
      } else {
        statusEl.innerText = "FAILED";
        statusEl.className = "fail";
      }
      
      slip.style.display = "block";
      break;
    }
  }
  
  if (!loginSuccess) {
    errorMsg.innerText = "Invalid username or password!";
  }
}
</script>
</body>
</html>
